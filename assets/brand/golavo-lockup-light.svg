<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" width="360" height="120" role="img" aria-label="Golavo">
  <title>Golavo</title>
  <style>
    .frame  { fill:none; stroke:#0B6E4F; stroke-opacity:.35; stroke-width:2; stroke-linecap:round; }
    .gbowl  { fill:none; stroke:#C9A227; stroke-width:7; stroke-linecap:round; stroke-linejoin:round;
              stroke-dasharray:100; stroke-dashoffset:0; }
    .seam   { fill:none; stroke:#F4EFE6; stroke-width:3; stroke-linecap:round; opacity:0; }
    .ball   { opacity:0; }
    .sun    { fill:#EB6101; opacity:.10; transform-box:fill-box; transform-origin:center; }
    .word   { fill:#101312; font-family:ui-sans-serif,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
              font-weight:800; font-size:46px; letter-spacing:3px; }
    .rule   { fill:none; stroke:#0B6E4F; stroke-width:3; stroke-linecap:round; stroke-dasharray:100; stroke-dashoffset:0; }

    @media (prefers-reduced-motion: no-preference) {
      .gbowl { animation: gdraw 6s ease-in-out infinite; }
      .seam  { animation: seam 6s ease-in-out infinite; }
      .ball  { animation: ballrun 6s ease-in-out infinite; }
      .sun   { animation: breath 4.8s ease-in-out infinite; }
      .rule  { animation: uline 6s ease-in-out infinite; }
    }
    @keyframes gdraw  { 0%{stroke-dashoffset:100} 35%{stroke-dashoffset:0} 90%{stroke-dashoffset:0} 100%{stroke-dashoffset:100} }
    @keyframes seam   { 0%,32%{opacity:0} 40%{opacity:.9} 62%{opacity:0} 100%{opacity:0} }
    @keyframes ballrun{ 0%{offset-distance:0%;opacity:0} 5%{opacity:1} 33%{offset-distance:100%;opacity:1} 41%{opacity:0} 100%{offset-distance:100%;opacity:0} }
    @keyframes breath { 0%,100%{opacity:.10;transform:scale(1)} 50%{opacity:.19;transform:scale(1.05)} }
    @keyframes uline  { 0%{stroke-dashoffset:100} 45%{stroke-dashoffset:0} 100%{stroke-dashoffset:0} }
  </style>

  <!-- floodlight sun behind the goal -->
  <circle class="sun" cx="60" cy="58" r="30"/>

  <!-- goal frame -->
  <path class="frame" d="M26 24 H94 M26 24 V96 M94 24 V96 M22 96 H98"/>
  <path class="frame" d="M40 30 V90 M60 30 V90 M80 30 V90" stroke-opacity=".14"/>

  <!-- the G, drawn by the ball's trajectory -->
  <path id="bowl-l" class="gbowl" pathLength="100" d="M90.8 45.6 A34 34 0 1 0 90.8 74.4 L74 74.4 L74 66"/>
  <path class="seam" pathLength="100" d="M90.8 45.6 A34 34 0 1 0 90.8 74.4 L74 74.4 L74 66"/>

  <!-- the ball -->
  <g class="ball" style="offset-path:path('M90.8 45.6 A34 34 0 1 0 90.8 74.4 L74 74.4 L74 66');">
    <circle r="5.5" fill="#101312"/>
    <circle r="1.7" cx="-1.4" cy="-1.4" fill="#F4EFE6"/>
  </g>

  <!-- wordmark -->
  <text class="word" x="132" y="70">GOLAVO</text>
  <path class="rule" pathLength="100" d="M134 84 H332"/>
</svg>
