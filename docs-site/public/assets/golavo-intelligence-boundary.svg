<svg width="1280" height="800" viewBox="0 0 1280 800" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Golavo local intelligence and optional AI boundary</title>
  <desc id="desc">The deterministic engine owns all probabilities and exact-score distributions. The Commentator's Notebook computes source-backed facts without a write path to forecasts. An evidence compiler creates an allowed-number bundle for an optional AI gateway. Guard validation either permits cited narrative or discards it and falls back to the unchanged local forecast. Casual, Expert, and Ledger views all share the same sealed numbers.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="24" x2="1256" y2="776" gradientUnits="userSpaceOnUse"><stop stop-color="#171B1A"/><stop offset=".55" stop-color="#101312"/><stop offset="1" stop-color="#0B0E0D"/></linearGradient>
    <linearGradient id="core" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#173128"/><stop offset=".55" stop-color="#1B211F"/><stop offset="1" stop-color="#242116"/></linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2D2418"/><stop offset="1" stop-color="#1A1713"/></linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="#C9A227" fill-opacity=".06"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#000" flood-opacity=".3"/></filter>
    <marker id="gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#C9A227"/></marker>
    <marker id="green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2F9E73"/></marker>
    <style>
      .title{font:600 31px ui-serif,Georgia,"Times New Roman",serif;fill:#F4EFE6;letter-spacing:-.4px}.subtitle{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.eye{font:700 11px ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:1.5px}.head{font:650 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#F4EFE6}.body{font:400 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.small{font:450 10px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#928E83}.mono{font:500 10.5px ui-monospace,"SF Mono",Menlo,monospace;fill:#BCB8AC}.chip{font:600 10px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.card{fill:#171B1A;stroke:#343A37;stroke-width:1.25}.edge{stroke:#C9A227;stroke-width:1.7;fill:none;marker-end:url(#gold)}
    </style>
  </defs>
  <rect width="1280" height="800" rx="28" fill="#090B0A"/>
  <rect x="24" y="24" width="1232" height="752" rx="24" fill="url(#bg)" stroke="#2C302E" stroke-width="1.25"/>
  <rect x="24" y="24" width="1232" height="752" rx="24" fill="url(#dots)"/>
  <text x="640" y="72" text-anchor="middle" class="title">One Forecast · Three Layers of Intelligence</text>
  <text x="640" y="99" text-anchor="middle" class="subtitle">Local statistics own every number. Facts add context. Optional AI may explain — and is disposable by design.</text>

  <!-- Column 1 core -->
  <g transform="translate(48 142)" filter="url(#shadow)">
    <rect width="348" height="410" rx="18" fill="url(#core)" stroke="#2F9E73" stroke-opacity=".62" stroke-width="1.4"/>
    <rect x="20" y="18" width="50" height="22" rx="11" fill="#0B6E4F" fill-opacity=".18"/><text x="45" y="33" text-anchor="middle" class="eye" fill="#7DD8B6">0</text>
    <text x="82" y="33" class="eye" fill="#7DD8B6">DETERMINISTIC ENGINE</text>
    <text x="20" y="74" class="head">The product — always on</text>
    <text x="20" y="99" class="body">Pure local computation over pinned snapshots.</text>
    <g transform="translate(20 124)">
      <rect width="308" height="48" rx="10" fill="#0B6E4F" fill-opacity=".1" stroke="#2F9E73" stroke-opacity=".35"/><text x="16" y="20" class="chip" fill="#7DD8B6">OWNS</text><text x="16" y="37" class="body">W / D / L probabilities + exact-score matrix</text>
      <rect y="60" width="308" height="48" rx="10" fill="#0B6E4F" fill-opacity=".1" stroke="#2F9E73" stroke-opacity=".35"/><text x="16" y="80" class="chip" fill="#7DD8B6">RECORDS</text><text x="16" y="97" class="body">model, cutoff, inputs, seed, hashes, result</text>
      <rect y="120" width="308" height="48" rx="10" fill="#0B6E4F" fill-opacity=".1" stroke="#2F9E73" stroke-opacity=".35"/><text x="16" y="140" class="chip" fill="#7DD8B6">EVALUATES</text><text x="16" y="157" class="body">log loss, Brier, ECE, RPS, reliability</text>
    </g>
    <rect x="20" y="326" width="308" height="58" rx="10" fill="#C9A227" fill-opacity=".09" stroke="#C9A227" stroke-opacity=".42"/>
    <text x="174" y="349" text-anchor="middle" class="chip" fill="#E7C34E">AUTHORITATIVE OUTPUT</text>
    <text x="174" y="370" text-anchor="middle" class="mono">sealed ForecastArtifact</text>
  </g>

  <!-- Column 2 facts/evidence -->
  <g transform="translate(466 142)">
    <rect width="348" height="410" rx="18" class="card"/>
    <rect x="20" y="18" width="50" height="22" rx="11" fill="#6082B8" fill-opacity=".18"/><text x="45" y="33" text-anchor="middle" class="eye" fill="#9AB3DD">1</text>
    <text x="82" y="33" class="eye" fill="#9AB3DD">FACTS + EVIDENCE</text>
    <text x="20" y="74" class="head">Context with hard edges</text>
    <text x="20" y="99" class="body">Deterministic templates run over source history.</text>
    <g transform="translate(20 124)">
      <rect width="308" height="62" rx="10" fill="#6082B8" fill-opacity=".1" stroke="#6082B8" stroke-opacity=".35"/>
      <text x="16" y="21" class="chip" fill="#9AB3DD">COMMENTATOR'S NOTEBOOK</text>
      <text x="16" y="40" class="body">predictive · context · coincidence</text><text x="16" y="55" class="small">sample guards · freshness · base rate · sources</text>
      <rect y="74" width="308" height="62" rx="10" fill="#6082B8" fill-opacity=".1" stroke="#6082B8" stroke-opacity=".35"/>
      <text x="16" y="95" class="chip" fill="#9AB3DD">EVIDENCE COMPILER</text>
      <text x="16" y="114" class="body">trusted sources + exact display strings</text><text x="16" y="129" class="small">same seal in → same bundle hash out</text>
      <rect y="148" width="308" height="62" rx="10" fill="#6082B8" fill-opacity=".1" stroke="#6082B8" stroke-opacity=".35"/>
      <text x="16" y="169" class="chip" fill="#9AB3DD">NUMERIC ALLOWLIST</text>
      <text x="16" y="188" class="body">number id · display · unit · trusted source</text><text x="16" y="203" class="small">unsupported or reworded numbers fail closed</text>
    </g>
    <rect x="20" y="350" width="308" height="34" rx="9" fill="#BC002D" fill-opacity=".075" stroke="#BC002D" stroke-opacity=".42"/>
    <text x="174" y="372" text-anchor="middle" class="chip" fill="#FF8A9B">FACT MODULES CANNOT IMPORT WRITERS</text>
  </g>

  <!-- Column 3 optional AI -->
  <g transform="translate(884 142)">
    <rect width="348" height="410" rx="18" fill="url(#ai)" stroke="#D9622B" stroke-opacity=".56" stroke-width="1.4"/>
    <rect x="20" y="18" width="50" height="22" rx="11" fill="#D9622B" fill-opacity=".16"/><text x="45" y="33" text-anchor="middle" class="eye" fill="#E88A57">2</text>
    <text x="82" y="33" class="eye" fill="#E88A57">OPTIONAL AI GATEWAY</text>
    <text x="20" y="74" class="head">Explanation — off by default</text>
    <text x="20" y="99" class="body">Receives only the compiled evidence bundle.</text>
    <g transform="translate(20 124)">
      <rect width="308" height="50" rx="10" fill="#D9622B" fill-opacity=".08" stroke="#D9622B" stroke-opacity=".34"/><text x="16" y="21" class="chip" fill="#E88A57">PROVIDERS</text><text x="16" y="39" class="body">local Ollama / llama.cpp · cloud BYOK</text>
      <rect y="62" width="308" height="50" rx="10" fill="#D9622B" fill-opacity=".08" stroke="#D9622B" stroke-opacity=".34"/><text x="16" y="83" class="chip" fill="#E88A57">MAY PRODUCE</text><text x="16" y="101" class="body">cited claims · scenarios · candidate facts</text>
      <rect y="124" width="308" height="72" rx="10" fill="#BC002D" fill-opacity=".08" stroke="#BC002D" stroke-opacity=".4"/><text x="16" y="145" class="chip" fill="#FF8A9B">REVIEW BEFORE DISPLAY</text><text x="16" y="164" class="body">schema + source ids + numeric whitelist</text><text x="16" y="181" class="body">betting lexicon + quote grounding</text>
    </g>
    <g transform="translate(20 334)">
      <rect width="68" height="26" rx="13" fill="#343A37"/><text x="34" y="17" text-anchor="middle" class="chip" fill="#BCB8AC">disabled</text>
      <rect x="78" width="83" height="26" rx="13" fill="#343A37"/><text x="119.5" y="17" text-anchor="middle" class="chip" fill="#BCB8AC">unavailable</text>
      <rect x="171" width="79" height="26" rx="13" fill="#BC002D" fill-opacity=".13"/><text x="210.5" y="17" text-anchor="middle" class="chip" fill="#FF8A9B">local_only</text>
      <rect x="260" width="48" height="26" rx="13" fill="#0B6E4F" fill-opacity=".2"/><text x="284" y="17" text-anchor="middle" class="chip" fill="#7DD8B6">ok</text>
    </g>
    <text x="174" y="384" text-anchor="middle" class="small">Any guard failure discards the narrative.</text>
  </g>

  <!-- arrows and boundary -->
  <path d="M396 302H460" class="edge"/>
  <text x="428" y="290" text-anchor="middle" class="small">sealed data</text>
  <path d="M814 302H878" stroke="#D9622B" stroke-width="1.7" fill="none" marker-end="url(#gold)"/>
  <text x="846" y="290" text-anchor="middle" class="small">bundle only</text>
  <rect x="833" y="365" width="31" height="110" rx="15.5" fill="#BC002D" fill-opacity=".1" stroke="#BC002D" stroke-opacity=".4"/>
  <path d="M843 391l11 11m0-11l-11 11M843 421l11 11m0-11l-11 11M843 451l11 11m0-11l-11 11" stroke="#FF8A9B" stroke-width="1.5" stroke-linecap="round"/>
  <text x="848" y="489" text-anchor="middle" class="eye" fill="#FF8A9B" transform="rotate(-90 848 489)">NO WRITE PATH</text>

  <!-- UI outputs -->
  <g transform="translate(48 592)">
    <rect width="1184" height="146" rx="18" fill="#121514" stroke="#343A37" stroke-width="1.25"/>
    <text x="22" y="30" class="eye" fill="#E7C34E">ONE SEALED FORECAST · MULTIPLE READ-ONLY VIEWS</text>
    <path d="M22 44H1162" stroke="#343A37"/>
    <g transform="translate(22 62)">
      <rect width="262" height="62" rx="11" fill="#0B6E4F" fill-opacity=".08" stroke="#2F9E73" stroke-opacity=".34"/>
      <text x="16" y="23" class="chip" fill="#7DD8B6">CASUAL</text><text x="16" y="43" class="body">plain-language read of the same numbers</text>
      <rect x="280" width="262" height="62" rx="11" fill="#6082B8" fill-opacity=".08" stroke="#6082B8" stroke-opacity=".34"/>
      <text x="296" y="23" class="chip" fill="#9AB3DD">EXPERT</text><text x="296" y="43" class="body">seal, provenance, matrix, uncertainty</text>
      <rect x="560" width="262" height="62" rx="11" fill="#C9A227" fill-opacity=".08" stroke="#C9A227" stroke-opacity=".34"/>
      <text x="576" y="23" class="chip" fill="#E7C34E">LEDGER</text><text x="576" y="43" class="body">real seals, results, and calibration</text>
      <rect x="840" width="300" height="62" rx="11" fill="#D9622B" fill-opacity=".07" stroke="#D9622B" stroke-opacity=".34"/>
      <text x="856" y="23" class="chip" fill="#E88A57">AI DEEP READ · OPTIONAL</text><text x="856" y="43" class="body">cited narrative; safe to remove entirely</text>
    </g>
  </g>
</svg>
