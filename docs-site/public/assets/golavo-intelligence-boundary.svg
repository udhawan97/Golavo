<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="800" viewBox="0 0 1280 800" role="img" aria-labelledby="title desc">
  <title id="title">Golavo intelligence boundary</title>
  <desc id="desc">A plain-language answer to who controls a Golavo match analysis, followed by a developer contract showing the deterministic engine, guarded facts and evidence, optional AI gateway, hard no-write boundary, and four read-only product surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="24" x2="1256" y2="776" gradientUnits="userSpaceOnUse"><stop stop-color="#171B1A"/><stop offset=".56" stop-color="#101312"/><stop offset="1" stop-color="#0B0E0D"/></linearGradient>
    <linearGradient id="engine" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#173128"/><stop offset=".62" stop-color="#1B211F"/><stop offset="1" stop-color="#282216"/></linearGradient>
    <linearGradient id="ai" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2B2117"/><stop offset="1" stop-color="#1B1713"/></linearGradient>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse"><circle cx="11" cy="11" r="1" fill="#C9A227" fill-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#000" flood-opacity=".28"/></filter>
    <marker id="gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#D4AD2E"/></marker>
    <marker id="orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#E07338"/></marker>
    <style>
      .title{font:600 34px Georgia,"Times New Roman",serif;letter-spacing:-.35px;fill:#F4EFE6}.sub{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.kicker{font:700 13px ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:1.1px}.head{font:650 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#F4EFE6}.body{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.small{font:400 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#928E83}.mono{font:500 12px ui-monospace,"SF Mono",Menlo,monospace;fill:#BCB8AC}.card{fill:#171B1A;stroke:#343A37;stroke-width:1.25}.signal{fill:none;stroke:#D4AD2E;stroke-width:2;stroke-dasharray:7 10;animation:travel 3.6s linear infinite}@keyframes travel{to{stroke-dashoffset:-68}}@media(prefers-reduced-motion:reduce){.signal{animation:none}}
    </style>
  </defs>
  <rect width="1280" height="800" rx="28" fill="#090B0A"/>
  <rect x="24" y="24" width="1232" height="752" rx="24" fill="url(#bg)" stroke="#2C302E" stroke-width="1.25"/>
  <rect x="25" y="25" width="1230" height="750" rx="23" fill="url(#dots)"/>
  <text x="640" y="68" text-anchor="middle" class="title">Who Decides What a Golavo Match Says?</text>
  <text x="640" y="94" text-anchor="middle" class="sub">The local engine chooses the numbers. Facts add context. Optional AI may explain — never edit.</text>

  <!-- Casual answer -->
  <g transform="translate(48 120)">
    <rect width="1184" height="136" rx="20" fill="#121514" stroke="#343A37" stroke-width="1.25"/>
    <text x="22" y="28" class="kicker" fill="#E7C34E">THE SHORT ANSWER</text>
    <path d="M334 79H440M744 79H850" class="signal" marker-end="url(#gold)"/>
    <g transform="translate(22 48)">
      <rect width="312" height="66" rx="13" fill="#0B6E4F" fill-opacity=".14" stroke="#2F9E73" stroke-opacity=".5"/>
      <circle cx="30" cy="33" r="17" fill="#0B6E4F" fill-opacity=".3"/><text x="30" y="37" text-anchor="middle" class="kicker" fill="#7DD8B6">1</text>
      <text x="58" y="28" class="head">Engine makes the forecast</text><text x="58" y="48" class="small">Every probability comes from local code.</text>
    </g>
    <g transform="translate(440 48)">
      <rect width="304" height="66" rx="13" fill="#6082B8" fill-opacity=".11" stroke="#6082B8" stroke-opacity=".48"/>
      <circle cx="30" cy="33" r="17" fill="#6082B8" fill-opacity=".25"/><text x="30" y="37" text-anchor="middle" class="kicker" fill="#B9CBEB">2</text>
      <text x="58" y="28" class="head">Evidence adds the why</text><text x="58" y="48" class="small">Sources and allowed numbers stay attached.</text>
    </g>
    <g transform="translate(850 48)">
      <rect width="312" height="66" rx="13" fill="#D9622B" fill-opacity=".09" stroke="#D9622B" stroke-opacity=".48"/>
      <circle cx="30" cy="33" r="17" fill="#D9622B" fill-opacity=".22"/><text x="30" y="37" text-anchor="middle" class="kicker" fill="#E88A57">3</text>
      <text x="58" y="28" class="head">AI explains, if invited</text><text x="58" y="48" class="small">Turn it off and the forecast stays identical.</text>
    </g>
  </g>

  <!-- Developer contract -->
  <g transform="translate(48 286)">
    <text x="0" y="17" class="kicker" fill="#9AB3DD">THE DEVELOPER CONTRACT</text>
    <g transform="translate(0 38)" filter="url(#shadow)">
      <rect width="348" height="286" rx="18" fill="url(#engine)" stroke="#2F9E73" stroke-opacity=".64" stroke-width="1.3"/>
      <rect x="20" y="18" width="44" height="22" rx="11" fill="#0B6E4F" fill-opacity=".26"/><text x="42" y="33" text-anchor="middle" class="kicker" fill="#7DD8B6">0</text><text x="78" y="33" class="kicker" fill="#7DD8B6">DETERMINISTIC ENGINE</text>
      <text x="20" y="68" class="head">The only numeric authority</text>
      <rect x="20" y="86" width="308" height="48" rx="10" fill="#0B6E4F" fill-opacity=".12" stroke="#2F9E73" stroke-opacity=".36"/><text x="34" y="106" class="kicker" fill="#7DD8B6">OWNS</text><text x="34" y="124" class="body">W / D / L · goal estimates · score matrix</text>
      <rect x="20" y="146" width="308" height="48" rx="10" fill="#0B6E4F" fill-opacity=".12" stroke="#2F9E73" stroke-opacity=".36"/><text x="34" y="166" class="kicker" fill="#7DD8B6">RECORDS</text><text x="34" y="184" class="body">model · cutoff · inputs · seed · hashes</text>
      <rect x="20" y="210" width="308" height="56" rx="10" fill="#C9A227" fill-opacity=".1" stroke="#C9A227" stroke-opacity=".42"/><text x="174" y="233" text-anchor="middle" class="kicker" fill="#E7C34E">SEALED OUTPUT</text><text x="174" y="253" text-anchor="middle" class="mono">ForecastArtifact</text>
    </g>

    <path d="M348 181H404" class="signal" marker-end="url(#gold)"/>
    <text x="376" y="166" text-anchor="middle" class="small">sealed data</text>
    <g transform="translate(404 38)">
      <rect width="348" height="286" rx="18" class="card"/>
      <rect x="20" y="18" width="44" height="22" rx="11" fill="#6082B8" fill-opacity=".2"/><text x="42" y="33" text-anchor="middle" class="kicker" fill="#9AB3DD">1</text><text x="78" y="33" class="kicker" fill="#9AB3DD">FACTS + EVIDENCE</text>
      <text x="20" y="68" class="head">Context with hard edges</text>
      <rect x="20" y="86" width="308" height="54" rx="10" fill="#6082B8" fill-opacity=".1" stroke="#6082B8" stroke-opacity=".36"/><text x="34" y="107" class="kicker" fill="#9AB3DD">NOTEBOOK</text><text x="34" y="127" class="body">predictive · context · coincidence</text>
      <rect x="20" y="152" width="308" height="54" rx="10" fill="#6082B8" fill-opacity=".1" stroke="#6082B8" stroke-opacity=".36"/><text x="34" y="173" class="kicker" fill="#9AB3DD">COMPILER</text><text x="34" y="193" class="body">trusted sources + exact displays</text>
      <rect x="20" y="218" width="308" height="48" rx="10" fill="#BC002D" fill-opacity=".08" stroke="#BC002D" stroke-opacity=".42"/><text x="174" y="247" text-anchor="middle" class="kicker" fill="#FF8A9B">CANNOT IMPORT FORECAST WRITERS</text>
    </g>

    <path d="M752 181H836" class="signal" marker-end="url(#orange)"/>
    <text x="794" y="166" text-anchor="middle" class="small">read-only bundle</text>
    <g transform="translate(836 38)" filter="url(#shadow)">
      <rect width="348" height="286" rx="18" fill="url(#ai)" stroke="#D9622B" stroke-opacity=".58" stroke-width="1.3"/>
      <rect x="20" y="18" width="44" height="22" rx="11" fill="#D9622B" fill-opacity=".22"/><text x="42" y="33" text-anchor="middle" class="kicker" fill="#E88A57">2</text><text x="78" y="33" class="kicker" fill="#E88A57">OPTIONAL AI GATEWAY</text>
      <text x="20" y="68" class="head">Disposable explanation layer</text>
      <rect x="20" y="86" width="308" height="42" rx="10" fill="#D9622B" fill-opacity=".08" stroke="#D9622B" stroke-opacity=".34"/><text x="34" y="111" class="body">local Ollama / llama.cpp · cloud BYOK</text>
      <rect x="20" y="140" width="308" height="74" rx="10" fill="#BC002D" fill-opacity=".09" stroke="#BC002D" stroke-opacity=".43"/><text x="34" y="162" class="kicker" fill="#FF8A9B">GUARDS BEFORE DISPLAY</text><text x="34" y="183" class="body">schema · source ids · numeric allowlist</text><text x="34" y="202" class="body">betting language · quote grounding</text>
      <g transform="translate(20 230)"><rect width="62" height="26" rx="13" fill="#343A37"/><text x="31" y="17" text-anchor="middle" class="small" fill="#BCB8AC">disabled</text><rect x="70" width="76" height="26" rx="13" fill="#343A37"/><text x="108" y="17" text-anchor="middle" class="small" fill="#BCB8AC">unavailable</text><rect x="154" width="72" height="26" rx="13" fill="#BC002D" fill-opacity=".16"/><text x="190" y="17" text-anchor="middle" class="small" fill="#FF8A9B">local_only</text><rect x="234" width="74" height="26" rx="13" fill="#0B6E4F" fill-opacity=".25"/><text x="271" y="17" text-anchor="middle" class="small" fill="#7DD8B6">ok</text></g>
    </g>
  </g>

  <!-- Same seal, different audiences -->
  <g transform="translate(48 650)">
    <rect width="1184" height="94" rx="18" fill="#121514" stroke="#343A37" stroke-width="1.25"/>
    <text x="20" y="27" class="kicker" fill="#E7C34E">ONE ENGINE · FOUR READ-ONLY PRODUCT SURFACES</text>
    <g transform="translate(20 42)">
      <rect width="268" height="34" rx="10" fill="#0B6E4F" fill-opacity=".1" stroke="#2F9E73" stroke-opacity=".38"/><text x="14" y="22" class="kicker" fill="#7DD8B6">COCKPIT</text><text x="91" y="22" class="small">model voices + facts</text>
      <rect x="284" width="268" height="34" rx="10" fill="#6082B8" fill-opacity=".1" stroke="#6082B8" stroke-opacity=".38"/><text x="298" y="22" class="kicker" fill="#9AB3DD">EXPERT</text><text x="366" y="22" class="small">grid + history support</text>
      <rect x="568" width="268" height="34" rx="10" fill="#C9A227" fill-opacity=".09" stroke="#C9A227" stroke-opacity=".38"/><text x="582" y="22" class="kicker" fill="#E7C34E">MODEL LAB</text><text x="674" y="22" class="small">seals + backtests</text>
      <rect x="852" width="292" height="34" rx="10" fill="#D9622B" fill-opacity=".08" stroke="#D9622B" stroke-opacity=".38"/><text x="866" y="22" class="kicker" fill="#E88A57">AI ANALYST</text><text x="963" y="22" class="small">optional cited synthesis</text>
    </g>
  </g>
</svg>
