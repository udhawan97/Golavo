<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="820" viewBox="0 0 1280 820" role="img" aria-labelledby="title desc">
  <title id="title">Golavo forecast lifecycle</title>
  <desc id="desc">A six-step plain-language journey from collecting a source snapshot to learning from the result, with a developer receipt showing the seal gate, immutable artifact, linked successor, and forward calibration record.</desc>
  <defs>
    <linearGradient id="bg" x1="24" y1="24" x2="1256" y2="796" gradientUnits="userSpaceOnUse"><stop stop-color="#171B1A"/><stop offset=".55" stop-color="#101312"/><stop offset="1" stop-color="#0B0E0D"/></linearGradient>
    <linearGradient id="seal" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#193026"/><stop offset=".55" stop-color="#1E2423"/><stop offset="1" stop-color="#292316"/></linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M32 0H0V32" fill="none" stroke="#6082B8" stroke-opacity=".045"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="11" flood-color="#000" flood-opacity=".28"/></filter>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="gold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#D4AD2E"/></marker>
    <marker id="orange" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#E07338"/></marker>
    <style>
      .title{font:600 34px Georgia,"Times New Roman",serif;letter-spacing:-.35px;fill:#F4EFE6}.sub{font:400 16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.kicker{font:700 13px ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:1.1px}.head{font:650 19px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#F4EFE6}.body{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.small{font:400 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#928E83}.mono{font:500 12px ui-monospace,"SF Mono",Menlo,monospace;fill:#BCB8AC}.card{fill:#171B1A;stroke:#343A37;stroke-width:1.25}.rail{fill:none;stroke:#D4AD2E;stroke-width:2.2;stroke-dasharray:8 11;animation:travel 4s linear infinite}.beat{animation:beat 4.8s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.d1{animation-delay:.8s}.d2{animation-delay:1.6s}.d3{animation-delay:2.4s}.d4{animation-delay:3.2s}.d5{animation-delay:4s}@keyframes travel{to{stroke-dashoffset:-76}}@keyframes beat{0%,18%,100%{opacity:.38;transform:scale(.92)}8%{opacity:1;transform:scale(1.08)}}@media(prefers-reduced-motion:reduce){.rail,.beat{animation:none}.beat{opacity:.75;transform:none}}
    </style>
  </defs>
  <rect width="1280" height="820" rx="28" fill="#090B0A"/>
  <rect x="24" y="24" width="1232" height="772" rx="24" fill="url(#bg)" stroke="#2C302E" stroke-width="1.25"/>
  <rect x="25" y="25" width="1230" height="770" rx="23" fill="url(#grid)"/>
  <text x="640" y="72" text-anchor="middle" class="title">A Forecast That Cannot Edit Its Own Past</text>
  <text x="640" y="98" text-anchor="middle" class="sub">Make the claim before kickoff. Record the result later. Keep both receipts.</text>

  <!-- Casual reader journey -->
  <g transform="translate(48 126)">
    <rect width="1184" height="218" rx="20" fill="#121514" stroke="#343A37" stroke-width="1.25"/>
    <text x="22" y="30" class="kicker" fill="#E7C34E">FOR EVERYONE · SIX SIMPLE STEPS</text><text x="1162" y="30" text-anchor="end" class="small">The glow follows the lifecycle</text>
    <path d="M92 100H1030" class="rail" marker-end="url(#gold)"/>

    <g transform="translate(24 54)">
      <circle cx="68" cy="46" r="32" fill="#142019" stroke="#2F9E73" stroke-opacity=".55"/><circle cx="94" cy="22" r="4" fill="#7DD8B6" class="beat" filter="url(#glow)"/>
      <text x="68" y="50" text-anchor="middle" class="kicker" fill="#D8EFE4">1</text><text x="68" y="103" text-anchor="middle" class="head">Collect</text><text x="68" y="123" text-anchor="middle" class="small">Pin source data</text>
    </g>
    <g transform="translate(218 54)">
      <circle cx="68" cy="46" r="32" fill="#18202A" stroke="#6082B8" stroke-opacity=".55"/><circle cx="94" cy="22" r="4" fill="#9AB3DD" class="beat d1" filter="url(#glow)"/>
      <text x="68" y="50" text-anchor="middle" class="kicker" fill="#B9CBEB">2</text><text x="68" y="103" text-anchor="middle" class="head">Prepare</text><text x="68" y="123" text-anchor="middle" class="small">Normalize matches</text>
    </g>
    <g transform="translate(412 54)">
      <circle cx="68" cy="46" r="32" fill="#242115" stroke="#C9A227" stroke-opacity=".58"/><circle cx="94" cy="22" r="4" fill="#E7C34E" class="beat d2" filter="url(#glow)"/>
      <text x="68" y="50" text-anchor="middle" class="kicker" fill="#E7C34E">3</text><text x="68" y="103" text-anchor="middle" class="head">Predict</text><text x="68" y="123" text-anchor="middle" class="small">Fit chronologically</text>
    </g>
    <g transform="translate(606 54)">
      <circle cx="68" cy="46" r="32" fill="#282315" stroke="#E7C34E" stroke-opacity=".7"/><circle cx="94" cy="22" r="4" fill="#E7C34E" class="beat d3" filter="url(#glow)"/>
      <text x="68" y="50" text-anchor="middle" class="kicker" fill="#F6D95F">4</text><text x="68" y="103" text-anchor="middle" class="head">Lock</text><text x="68" y="123" text-anchor="middle" class="small">Seal before kickoff</text>
    </g>
    <g transform="translate(800 54)">
      <circle cx="68" cy="46" r="32" fill="#261A14" stroke="#D9622B" stroke-opacity=".58"/><circle cx="94" cy="22" r="4" fill="#E88A57" class="beat d4" filter="url(#glow)"/>
      <text x="68" y="50" text-anchor="middle" class="kicker" fill="#E88A57">5</text><text x="68" y="103" text-anchor="middle" class="head">Score</text><text x="68" y="123" text-anchor="middle" class="small">Link the result</text>
    </g>
    <g transform="translate(994 54)">
      <circle cx="68" cy="46" r="32" fill="#18202A" stroke="#6082B8" stroke-opacity=".55"/><circle cx="94" cy="22" r="4" fill="#9AB3DD" class="beat d5" filter="url(#glow)"/>
      <text x="68" y="50" text-anchor="middle" class="kicker" fill="#B9CBEB">6</text><text x="68" y="103" text-anchor="middle" class="head">Learn</text><text x="68" y="123" text-anchor="middle" class="small">Update calibration</text>
    </g>
    <rect x="22" y="184" width="1140" height="20" rx="10" fill="#BC002D" fill-opacity=".075" stroke="#BC002D" stroke-opacity=".3"/>
    <text x="592" y="198" text-anchor="middle" class="mono" fill="#FF8A9B">THE LOCKED FORECAST IS NEVER REWRITTEN · THE RESULT IS A NEW, LINKED RECORD</text>
  </g>

  <!-- Developer receipts -->
  <g transform="translate(48 370)">
    <text x="0" y="17" class="kicker" fill="#9AB3DD">FOR DEVELOPERS · THE RECEIPTS UNDER EACH STEP</text>
    <g transform="translate(0 38)" filter="url(#shadow)">
      <rect width="350" height="314" rx="18" class="card"/>
      <text x="20" y="31" class="kicker" fill="#7DD8B6">A · SOURCE + MODEL STATE</text><text x="20" y="62" class="head">Reproducible inputs</text>
      <rect x="20" y="82" width="310" height="66" rx="11" fill="#0B6E4F" fill-opacity=".1" stroke="#2F9E73" stroke-opacity=".38"/>
      <text x="36" y="105" class="body">Pinned bytes · manifest · SHA-256</text><text x="36" y="127" class="small">source ref · license · retrieval time</text>
      <rect x="20" y="160" width="310" height="90" rx="11" fill="#6082B8" fill-opacity=".09" stroke="#6082B8" stroke-opacity=".38"/>
      <text x="36" y="183" class="body">Model family · version · seed</text><text x="36" y="205" class="body">parameters hash · training cutoff</text><text x="36" y="227" class="small">chronological folds; no future rows</text>
      <rect x="20" y="266" width="310" height="28" rx="9" fill="#101312" stroke="#343A37"/><text x="175" y="285" text-anchor="middle" class="mono">snapshot A → typed table → fit</text>
    </g>

    <path d="M350 195H394" fill="none" stroke="#D4AD2E" stroke-width="1.8" marker-end="url(#gold)"/>
    <g transform="translate(394 38)" filter="url(#shadow)">
      <rect width="396" height="314" rx="18" fill="url(#seal)" stroke="#C9A227" stroke-opacity=".62" stroke-width="1.25"/>
      <text x="20" y="31" class="kicker" fill="#E7C34E">B · FAIL-CLOSED SEAL</text><text x="20" y="62" class="head">ForecastArtifact</text>
      <g transform="translate(20 82)">
        <circle cx="8" cy="8" r="8" fill="#0B6E4F" fill-opacity=".28"/><path d="M5 8l2 2 4-5" fill="none" stroke="#7DD8B6" stroke-width="1.4"/><text x="25" y="12" class="body">data state ≤ seal time</text>
        <circle cx="8" cy="40" r="8" fill="#0B6E4F" fill-opacity=".28"/><path d="M5 40l2 2 4-5" fill="none" stroke="#7DD8B6" stroke-width="1.4"/><text x="25" y="44" class="body">seal time &lt; kickoff proxy</text>
        <circle cx="8" cy="72" r="8" fill="#0B6E4F" fill-opacity=".28"/><path d="M5 72l2 2 4-5" fill="none" stroke="#7DD8B6" stroke-width="1.4"/><text x="25" y="76" class="body">training cutoff blocks leakage</text>
        <circle cx="8" cy="104" r="8" fill="#0B6E4F" fill-opacity=".28"/><path d="M5 104l2 2 4-5" fill="none" stroke="#7DD8B6" stroke-width="1.4"/><text x="25" y="108" class="body">fixture is still scheduled</text>
      </g>
      <path d="M20 210H376" stroke="#49442B"/>
      <text x="20" y="235" class="body">W / D / L · expected goals · score matrix + tail</text><text x="20" y="257" class="small">snapshot ids · generator metadata · cutoff</text>
      <rect x="20" y="272" width="356" height="22" rx="9" fill="#C9A227" fill-opacity=".11"/><text x="198" y="287" text-anchor="middle" class="mono" fill="#E7C34E">canonical JSON · payload_sha256</text>
    </g>

    <path d="M790 195H834" fill="none" stroke="#E07338" stroke-width="1.8" marker-end="url(#orange)"/>
    <g transform="translate(834 38)" filter="url(#shadow)">
      <rect width="350" height="314" rx="18" class="card"/>
      <text x="20" y="31" class="kicker" fill="#E88A57">C · NEWER STATE + SUCCESSOR</text><text x="20" y="62" class="head">Resolve once, append only</text>
      <rect x="20" y="82" width="310" height="58" rx="11" fill="#D9622B" fill-opacity=".09" stroke="#D9622B" stroke-opacity=".4"/>
      <text x="36" y="105" class="body">Snapshot B must be strictly newer</text><text x="36" y="126" class="small">same fixture now has a result or reason</text>
      <rect x="20" y="152" width="310" height="66" rx="11" fill="#D9622B" fill-opacity=".1" stroke="#D9622B" stroke-opacity=".46"/>
      <text x="36" y="176" class="body">Scored or voided successor</text><text x="36" y="198" class="small">outcome · log loss · Brier · void reason</text>
      <rect x="20" y="230" width="310" height="64" rx="11" fill="#6082B8" fill-opacity=".09" stroke="#6082B8" stroke-opacity=".4"/>
      <text x="36" y="253" class="body">Forward calibration record</text><text x="36" y="275" class="small">counts · quality · reliability bins</text>
    </g>
  </g>
  <text x="640" y="770" text-anchor="middle" class="small">Historical backtests remain separate from genuine pre-kickoff seals.</text>
</svg>
