<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="900" viewBox="0 0 1280 900" role="img" aria-labelledby="title desc">
  <title id="title">Golavo system architecture</title>
  <desc id="desc">A plain-language path from the desktop app to a local forecasting engine, followed by a developer map of the Tauri shell, React workbench, FastAPI sidecar, deterministic Python core, local artifacts, optional AI, and packaging boundary.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="1240" y2="872" gradientUnits="userSpaceOnUse"><stop stop-color="#171B1A"/><stop offset=".58" stop-color="#101312"/><stop offset="1" stop-color="#0B0E0D"/></linearGradient>
    <linearGradient id="goldCard" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#23291F"/><stop offset="1" stop-color="#1A1C17"/></linearGradient>
    <linearGradient id="greenCard" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#173128"/><stop offset="1" stop-color="#171B1A"/></linearGradient>
    <pattern id="waves" width="52" height="26" patternUnits="userSpaceOnUse"><path d="M0 26C7 12 19 12 26 26C33 12 45 12 52 26M0 13C7-1 19-1 26 13C33-1 45-1 52 13" fill="none" stroke="#6082B8" stroke-opacity=".055"/></pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%"><feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity=".28"/></filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#D4AD2E"/></marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10Z" fill="#2FB488"/></marker>
    <clipPath id="flowClip170"><rect width="170" height="88" rx="14"/></clipPath>
    <clipPath id="flowClip200"><rect width="200" height="88" rx="14"/></clipPath>
    <style>
      .title{font:600 32px Georgia,"Times New Roman",serif;letter-spacing:-.35px;fill:#F4EFE6}.sub{font:400 14px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.kicker{font:700 11px ui-monospace,"SF Mono",Menlo,monospace;letter-spacing:1.5px}.head{font:650 17px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#F4EFE6}.flowHead{font:650 15.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#F4EFE6}.body{font:400 12.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#BCB8AC}.small{font:400 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#928E83}.mono{font:500 10.5px ui-monospace,"SF Mono",Menlo,monospace;fill:#BCB8AC}.step{font:700 11px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#101312}.card{fill:#171B1A;stroke:#343A37;stroke-width:1.25}.flow{fill:none;stroke:#D4AD2E;stroke-width:2;marker-end:url(#arrowGold)}.signal{fill:none;stroke:#D4AD2E;stroke-width:2;stroke-dasharray:7 10;animation:travel 3.6s linear infinite}.pulse{animation:pulse 2.4s ease-in-out infinite;transform-box:fill-box;transform-origin:center}.delay1{animation-delay:.5s}.delay2{animation-delay:1s}.delay3{animation-delay:1.5s}.delay4{animation-delay:2s}@keyframes travel{to{stroke-dashoffset:-68}}@keyframes pulse{0%,70%,100%{opacity:.35}35%{opacity:1}}@media(prefers-reduced-motion:reduce){.signal,.pulse{animation:none}.pulse{opacity:.72}}
    </style>
  </defs>
  <rect width="1280" height="900" rx="28" fill="#090B0A"/>
  <rect x="24" y="24" width="1232" height="852" rx="24" fill="url(#bg)" stroke="#2C302E" stroke-width="1.25"/>
  <rect x="25" y="25" width="1230" height="850" rx="23" fill="url(#waves)"/>

  <g transform="translate(48 46)">
    <rect width="36" height="36" rx="11" fill="#C9A227" fill-opacity=".13" stroke="#C9A227" stroke-opacity=".48"/>
    <path d="M10 25c5-12 12-15 18-14M10 25c6-5 13-6 18-2M18 9v18" fill="none" stroke="#E7C34E" stroke-width="1.7" stroke-linecap="round"/>
  </g>
  <text x="640" y="72" text-anchor="middle" class="title">How Golavo Works</text>
  <text x="640" y="98" text-anchor="middle" class="sub">One private desktop app. One local forecasting authority. Optional explanation on the outside.</text>

  <!-- Casual reader: the five-second story -->
  <g transform="translate(48 126)">
    <rect width="1184" height="170" rx="20" fill="#121514" stroke="#343A37" stroke-width="1.25"/>
    <text x="22" y="28" class="kicker" fill="#E7C34E">THE FIVE-SECOND VERSION</text>
    <text x="1162" y="28" text-anchor="end" class="small">Follow the gold line</text>
    <path d="M194 94H258" class="flow signal"/><path d="M428 94H492" class="flow signal"/><path d="M662 94H726" class="flow signal"/><path d="M896 94H960" class="flow signal"/>

    <g transform="translate(24 50)">
      <rect width="170" height="88" rx="14" fill="#6082B8" fill-opacity=".11" stroke="#6082B8" stroke-opacity=".45"/>
      <g clip-path="url(#flowClip170)"><circle cx="28" cy="27" r="13" fill="#6082B8" fill-opacity=".25"/><text x="28" y="31" text-anchor="middle" class="kicker" fill="#B9CBEB">1</text>
      <text x="50" y="31" class="flowHead">Open the app</text><text x="18" y="59" class="body">The desktop shell starts</text><text x="18" y="77" class="small">a private local service.</text></g>
    </g>
    <g transform="translate(258 50)">
      <rect width="170" height="88" rx="14" fill="#6082B8" fill-opacity=".11" stroke="#6082B8" stroke-opacity=".45"/>
      <g clip-path="url(#flowClip170)"><circle cx="28" cy="27" r="13" fill="#6082B8" fill-opacity=".25"/><text x="28" y="31" text-anchor="middle" class="kicker" fill="#B9CBEB">2</text>
      <text x="50" y="31" class="flowHead">Browse</text><text x="18" y="59" class="body">Games, Leagues,</text><text x="18" y="77" class="small">Cockpit and Model Lab.</text></g>
    </g>
    <g transform="translate(492 50)">
      <rect width="170" height="88" rx="14" fill="#0B6E4F" fill-opacity=".13" stroke="#2F9E73" stroke-opacity=".5"/>
      <g clip-path="url(#flowClip170)"><circle cx="28" cy="27" r="13" fill="#0B6E4F" fill-opacity=".3"/><text x="28" y="31" text-anchor="middle" class="kicker" fill="#7DD8B6">3</text>
      <text x="50" y="31" class="flowHead">Local API</text><text x="18" y="59" class="body">A launch-only token</text><text x="18" y="77" class="small">protects each request.</text></g>
    </g>
    <g transform="translate(726 50)">
      <rect width="170" height="88" rx="14" fill="url(#goldCard)" stroke="#C9A227" stroke-opacity=".62"/>
      <g clip-path="url(#flowClip170)"><circle cx="28" cy="27" r="13" fill="#C9A227" fill-opacity=".2"/><text x="28" y="31" text-anchor="middle" class="kicker" fill="#E7C34E">4</text>
      <text x="50" y="31" class="flowHead">Engine decides</text><text x="18" y="59" class="body">Pinned data produces</text><text x="18" y="77" class="small">every forecast number.</text></g>
    </g>
    <g transform="translate(960 50)">
      <rect width="200" height="88" rx="14" fill="#D9622B" fill-opacity=".08" stroke="#D9622B" stroke-opacity=".48"/>
      <g clip-path="url(#flowClip200)"><circle cx="28" cy="27" r="13" fill="#D9622B" fill-opacity=".22"/><text x="28" y="31" text-anchor="middle" class="kicker" fill="#E88A57">5</text>
      <text x="50" y="31" class="flowHead">AI may explain</text><text x="18" y="59" class="body">It may narrate evidence.</text><text x="18" y="77" class="small">It cannot change a forecast.</text></g>
    </g>
  </g>

  <!-- Developer reader: implementation map -->
  <g transform="translate(48 322)">
    <rect width="1184" height="498" rx="20" fill="#0E1110" fill-opacity=".9" stroke="#2F9E73" stroke-opacity=".5" stroke-width="1.25" stroke-dasharray="8 8"/>
    <rect x="22" y="-13" width="286" height="28" rx="14" fill="#101312" stroke="#2F9E73" stroke-opacity=".55"/>
    <text x="42" y="6" class="kicker" fill="#D8EFE4">DEVELOPER MAP · LOCAL NUMERIC AUTHORITY</text>

    <!-- left runtime stack -->
    <g transform="translate(22 34)" filter="url(#shadow)">
      <rect width="816" height="78" rx="14" fill="url(#goldCard)" stroke="#C9A227" stroke-opacity=".58"/>
      <rect x="18" y="17" width="44" height="44" rx="11" fill="#C9A227" fill-opacity=".13"/><path d="M29 30h22v18H29zM34 26h12v4" fill="none" stroke="#E7C34E" stroke-width="1.6"/>
      <text x="78" y="29" class="kicker" fill="#E7C34E">TAURI 2 · RUST SUPERVISOR</text><text x="78" y="52" class="body">Chooses port + token, starts the sidecar, waits for health, injects config, kills child on exit.</text>
      <rect x="622" y="17" width="174" height="24" rx="12" fill="#101312" stroke="#49442B"/><text x="709" y="33" text-anchor="middle" class="mono">desktop/src-tauri</text>
    </g>
    <path d="M430 112V132" class="flow"/><circle cx="430" cy="122" r="3.5" fill="#E7C34E" class="pulse" filter="url(#glow)"/>
    <g transform="translate(22 132)">
      <rect width="816" height="78" rx="14" class="card"/>
      <rect x="18" y="17" width="44" height="44" rx="11" fill="#6082B8" fill-opacity=".15"/><path d="M29 29h22v18H29zM29 35h22" fill="none" stroke="#9AB3DD" stroke-width="1.6"/>
      <text x="78" y="29" class="kicker" fill="#9AB3DD">REACT + TYPESCRIPT WORKBENCH</text><text x="78" y="52" class="body">Validated views: Games · Leagues · Match Cockpit · Model Lab · Casual / Expert.</text>
      <rect x="664" y="17" width="132" height="24" rx="12" fill="#101312" stroke="#343A37"/><text x="730" y="33" text-anchor="middle" class="mono">ui/src</text>
    </g>
    <path d="M430 210V230" class="flow"/><circle cx="430" cy="220" r="3.5" fill="#E7C34E" class="pulse delay1" filter="url(#glow)"/>
    <g transform="translate(22 230)">
      <rect width="816" height="78" rx="14" class="card"/>
      <rect x="18" y="17" width="44" height="44" rx="11" fill="#0B6E4F" fill-opacity=".2"/><path d="M29 30h22M29 39h22M29 48h14" fill="none" stroke="#7DD8B6" stroke-width="1.6" stroke-linecap="round"/>
      <text x="78" y="29" class="kicker" fill="#7DD8B6">FASTAPI · PYINSTALLER SIDECAR</text><text x="78" y="52" class="body">Token-gated loopback routes serve forecasts, facts, calibration, evaluation and optional narration.</text>
      <rect x="612" y="17" width="184" height="24" rx="12" fill="#101312" stroke="#343A37"/><text x="704" y="33" text-anchor="middle" class="mono">server/golavo_server</text>
    </g>
    <path d="M430 308V328" class="flow"/><circle cx="430" cy="318" r="3.5" fill="#E7C34E" class="pulse delay2" filter="url(#glow)"/>
    <g transform="translate(22 328)" filter="url(#shadow)">
      <rect width="816" height="94" rx="14" fill="url(#greenCard)" stroke="#2F9E73" stroke-opacity=".62"/>
      <rect x="18" y="17" width="44" height="44" rx="11" fill="#C9A227" fill-opacity=".13"/><circle cx="40" cy="39" r="11" fill="none" stroke="#E7C34E" stroke-width="1.5"/><path d="M40 28v22M29 39h22" stroke="#E7C34E" stroke-width="1.2"/>
      <text x="78" y="29" class="kicker" fill="#E7C34E">DETERMINISTIC PYTHON CORE · THE ONLY NUMERIC AUTHORITY</text><text x="78" y="52" class="body">Ingest → models → sealed artifacts → facts/evidence → forward evaluation. No UI or AI writes probabilities.</text>
      <text x="78" y="76" class="mono">core/golavo_core  ·  packs/  ·  data/artifacts/  ·  docs/contracts/</text>
    </g>

    <!-- right boundary cards; connectors stay in the dedicated gap -->
    <g transform="translate(870 34)">
      <rect width="292" height="210" rx="16" fill="#201912" stroke="#D9622B" stroke-opacity=".5"/>
      <text x="20" y="30" class="kicker" fill="#E88A57">OPTIONAL EXPLANATION</text><text x="20" y="58" class="head">Outside the forecast engine</text>
      <text x="20" y="84" class="body">Receives a fixed evidence bundle.</text><text x="20" y="103" class="body">Returns guarded narrative or nothing.</text>
      <rect x="20" y="124" width="252" height="32" rx="9" fill="#0B6E4F" fill-opacity=".13" stroke="#2F9E73" stroke-opacity=".4"/><text x="34" y="145" class="mono" fill="#7DD8B6">local Ollama / llama.cpp</text>
      <rect x="20" y="166" width="252" height="26" rx="8" fill="#BC002D" fill-opacity=".09" stroke="#BC002D" stroke-opacity=".42"/><text x="146" y="184" text-anchor="middle" class="kicker" fill="#FF8A9B">NO PROBABILITY WRITE PATH</text>
    </g>
    <path d="M838 269H852V139H870" fill="none" stroke="#D9622B" stroke-width="1.8" stroke-dasharray="6 7" marker-end="url(#arrowGold)"/>
    <g transform="translate(870 266)">
      <rect width="292" height="156" rx="16" class="card"/>
      <text x="20" y="30" class="kicker" fill="#9AB3DD">BUILD + RELEASE</text><text x="20" y="58" class="head">Downstream of runtime</text>
      <text x="20" y="84" class="body">PyInstaller sidecar → Tauri bundle</text><text x="20" y="105" class="body">→ DMG / MSI / EXE → checksums</text>
      <rect x="20" y="118" width="252" height="23" rx="8" fill="#C9A227" fill-opacity=".09" stroke="#C9A227" stroke-opacity=".4"/><text x="146" y="134" text-anchor="middle" class="mono" fill="#E7C34E">signing gated on secrets</text>
    </g>
    <path d="M838 392H870" fill="none" stroke="#6082B8" stroke-width="1.7" stroke-dasharray="5 7" marker-end="url(#arrowGreen)"/>

    <rect x="22" y="446" width="1140" height="32" rx="10" fill="#C9A227" fill-opacity=".07" stroke="#C9A227" stroke-opacity=".28"/>
    <text x="592" y="467" text-anchor="middle" class="mono" fill="#E7C34E">NUMBERS FLOW OUT · USER INTENT FLOWS IN · OPTIONAL NARRATIVE CAN DISAPPEAR WITHOUT CHANGING THE FORECAST</text>
  </g>
</svg>
