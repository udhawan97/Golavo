name: Release

# Stable releases build from a v* tag; a manual dispatch can cut a beta.
# Desktop build steps are guarded until the Tauri shell lands in Phase 4.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options: [beta, stable]
        default: beta

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - uses: actions/checkout@v4
      - id: meta
        name: Resolve version & channel
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-beta.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Guard — desktop shell present?
        id: guard
        shell: bash
        run: |
          if [ -f desktop/tauri.conf.json ] || [ -f desktop/src-tauri/tauri.conf.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Desktop shell not scaffolded yet (Phase 4). Skipping platform build."
          fi
      # --- The steps below activate in Phase 4 (see docs/adr/0001-architecture.md) ---
      - uses: actions/setup-python@v6
        if: steps.guard.outputs.ready == 'true'
        with: { python-version: "3.11" }
      - uses: actions/setup-node@v4
        if: steps.guard.outputs.ready == 'true'
        with: { node-version: "20" }
      - uses: dtolnay/rust-toolchain@stable
        if: steps.guard.outputs.ready == 'true'
        with:
          targets: ${{ matrix.target }}
      - name: Build sidecar (PyInstaller) + Tauri bundle
        if: steps.guard.outputs.ready == 'true'
        shell: bash
        run: bash packaging/build.sh "${{ matrix.target }}"
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
      - name: Upload build artifacts
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: golavo-${{ matrix.target }}
          path: packaging/out/**

  publish:
    needs: [prepare, build]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    env:
      MINISIGN_SECRET_KEY: ${{ secrets.MINISIGN_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with: { path: dist, merge-multiple: true }
        continue-on-error: true
      - name: Checksums
        run: |
          mkdir -p dist && cd dist
          if ls * >/dev/null 2>&1; then sha256sum * > SHA256SUMS.txt || true; fi
      - name: Sign checksums (minisign, if key configured)
        if: env.MINISIGN_SECRET_KEY != ''
        run: echo "minisign signing step runs when the secret is present"
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ needs.prepare.outputs.channel != 'stable' }}
          generate_release_notes: true
          files: dist/**
