name: Release

# Stable releases build from a v* tag; a manual dispatch can cut a beta build
# (artifacts only — publish is tag-gated, so betas never touch GitHub Releases
# or the updater's releases/latest endpoint).
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options: [beta, stable]
        default: beta

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
    steps:
      - uses: actions/checkout@v7
      - id: meta
        name: Resolve version & channel
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "channel=stable" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-beta.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
            echo "channel=${{ inputs.channel }}" >> "$GITHUB_OUTPUT"
          fi
      - name: Guard — tag must match the committed version
        if: startsWith(github.ref, 'refs/tags/v')
        # The updater compares the version compiled into tauri.conf.json, so a
        # tag that outruns the committed version would ship a binary that can
        # never see its own successor. Bump first (make release-bump), then tag.
        run: python3 scripts/bump_version.py --check "${GITHUB_REF#refs/tags/}"

  preflight:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v7
        with: { node-version: "22" }
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]" -e "server[dev]"
      - name: Guard release version and notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          python3 scripts/bump_version.py --check "$VERSION"
          test -s "docs/releases/v${VERSION}.md"
      - name: Python, determinism, provenance and isolation gates
        run: |
          ruff check .
          make validate
          bash scripts/check_license_isolation.sh
          python scripts/gen_third_party_notices.py --check
          python -m golavo_core index --output /tmp/rebuilt_index.parquet
          python - <<'PY'
          import hashlib, json, pathlib, sys

          def sha256(path):
              return hashlib.sha256(pathlib.Path(path).read_bytes()).hexdigest()

          rebuilt = sha256("/tmp/rebuilt_index.parquet")
          committed = sha256("data/index/matches_index.parquet")
          recorded = json.loads(
              pathlib.Path("data/index/matches_index.meta.json").read_text()
          )["parquet_sha256"]
          if not rebuilt == committed == recorded:
              print("::error::match index drift — committed copy is not a clean rebuild")
              sys.exit(1)
          PY
          pytest -q
      - name: UI and public docs gates
        run: |
          npm --prefix ui ci
          npm --prefix ui test -- --run
          npm --prefix ui run build
          cd ui
          npx playwright install --with-deps chromium
          npm run test:e2e --if-present
          cd ..
          npm --prefix docs-site ci
          npm --prefix docs-site run check
          npm --prefix docs-site run build

  build:
    needs: [prepare, preflight]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - name: Guard — desktop shell present?
        id: guard
        shell: bash
        run: |
          if [ -f desktop/tauri.conf.json ] || [ -f desktop/src-tauri/tauri.conf.json ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Desktop shell not scaffolded yet (Phase 4). Skipping platform build."
          fi
      - name: Guard — stable releases must be able to sign updates
        if: steps.guard.outputs.ready == 'true' && startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        # A stable release built without the signing key produces installers with
        # no updater compiled in: everyone who installs it is silently stranded
        # off the update chain forever. Fail loudly instead.
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is not configured — refusing to cut a stable release whose installs could never auto-update."
            exit 1
          fi
          if grep -q "REPLACE_WITH_TAURI_UPDATER_PUBLIC_KEY" desktop/src-tauri/tauri.updater.conf.json; then
            echo "::error::tauri.updater.conf.json still holds the placeholder pubkey — updates built now could never be verified."
            exit 1
          fi
      - uses: actions/setup-python@v6
        if: steps.guard.outputs.ready == 'true'
        with: { python-version: "3.12" }  # core pins scipy 1.18.0, which requires >=3.12
      - uses: actions/setup-node@v7
        if: steps.guard.outputs.ready == 'true'
        with: { node-version: "22" }
      - uses: dtolnay/rust-toolchain@stable
        if: steps.guard.outputs.ready == 'true'
        with:
          targets: ${{ matrix.target }}
      - name: Install Python build deps (sidecar)
        if: steps.guard.outputs.ready == 'true'
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e core -e server pyinstaller
      - name: Build sidecar (PyInstaller) + Tauri bundle
        if: steps.guard.outputs.ready == 'true'
        shell: bash
        run: bash packaging/build.sh "${{ matrix.target }}"
        env:
          # Updater signing is REQUIRED for stable tags (guard above); Apple
          # code-signing/notarization stays optional — Tauri skips each step
          # when its secret is empty.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      - name: Upload build artifacts
        if: steps.guard.outputs.ready == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: golavo-${{ matrix.target }}
          path: packaging/out/**
          if-no-files-found: error

  publish:
    needs: [prepare, build]
    # Tag-gated AND requires every build leg green: a half-shipped release would
    # publish a latest.json whose missing platform makes update checks error out
    # on that platform (the plugin resolves URLs for the current platform
    # unconditionally). No release beats a broken one.
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with: { node-version: "22" }
      - uses: actions/download-artifact@v8
        with: { path: dist, merge-multiple: true }
      - name: Assemble + validate updater manifest (latest.json)
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Per-leg checksum files are superseded by the merged SHA256SUMS.txt.
          rm -f dist/SHA256SUMS-*
          python3 scripts/make_update_manifest.py generate \
            --dist dist --version "$VERSION" --tag "$TAG" --repo "${{ github.repository }}" \
            --notes-file "docs/releases/v${VERSION}.md"
          python3 scripts/make_update_manifest.py validate \
            --manifest dist/latest.json --dist dist --tag "$TAG"
      - name: Checksums
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          cd dist
          sha256sum * > ../SHA256SUMS.txt && mv ../SHA256SUMS.txt .
          cd ..
          npm --prefix desktop ci
          npm --prefix desktop exec tauri signer sign -- dist/SHA256SUMS.txt
          test -s dist/SHA256SUMS.txt.sig
      - name: Publish GitHub Release (draft until every asset is uploaded)
        uses: softprops/action-gh-release@v3
        with:
          # Draft first: releases/latest must never point at a release whose
          # latest.json or installers are still uploading. The undraft below
          # makes the cutover atomic.
          draft: true
          # Stable tags publish as REAL releases — the updater endpoint
          # (releases/latest/download/latest.json) skips prereleases entirely.
          prerelease: ${{ needs.prepare.outputs.channel != 'stable' }}
          generate_release_notes: false
          body_path: docs/releases/v${{ needs.prepare.outputs.version }}.md
          files: dist/**
      - name: Undraft — atomic cutover for releases/latest
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "${GITHUB_REF#refs/tags/}" --draft=false
