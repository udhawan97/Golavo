name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    name: core / server (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]"
          pip install -e "server[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Validate pinned source provenance
        run: python scripts/validate_provenance.py
      - name: Validate canonical sample artifacts
        run: python scripts/validate_artifacts.py
      - name: Match index — verify committed copy is a clean rebuild
        # Rebuild the index from the CC0 packs and assert byte-identical output.
        # Core deps are ==-pinned so pyarrow's Parquet encoding is stable; a
        # mismatch means either a pack changed without a rebuild or a dep bump
        # changed the bytes — in the latter case, rebuild + recommit the index.
        run: |
          python -m golavo_core index --output /tmp/rebuilt_index.parquet
          python - <<'PY'
          import hashlib, json, pathlib, sys

          def sha256(path):
              return hashlib.sha256(pathlib.Path(path).read_bytes()).hexdigest()

          rebuilt = sha256("/tmp/rebuilt_index.parquet")
          committed = sha256("data/index/matches_index.parquet")
          meta = json.loads(pathlib.Path("data/index/matches_index.meta.json").read_text())
          committed_meta = meta["parquet_sha256"]

          if not (rebuilt == committed == committed_meta):
              print("::error::match index drift — committed copy is not a clean rebuild")
              print(f"  rebuilt parquet sha256        = {rebuilt}")
              print(f"  committed parquet sha256      = {committed}")
              print(f"  committed meta parquet_sha256 = {committed_meta}")
              print("Fix: run `python -m golavo_core index` and commit data/index/*.")
              sys.exit(1)
          print(f"match index OK: rebuild == committed ({rebuilt})")
          PY
      - name: Test determinism, leakage, core, and API
        run: pytest -q

  ui:
    name: ui (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build & test UI
        run: |
          if [ -f ui/package.json ]; then
            cd ui && npm install && npm test --if-present && npm run build --if-present
          else
            echo "No UI package yet (scaffold phase)."
          fi

  docs:
    name: docs-site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Build docs
        run: |
          if [ -f docs-site/package.json ]; then
            cd docs-site && npm install && npm run check && npm run build
          else
            echo "No docs-site yet (scaffold phase)."
          fi

  license-isolation:
    name: license isolation guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ODbL must never contaminate the CC0 core
        run: bash scripts/check_license_isolation.sh

  sidecar-smoke:
    name: sidecar smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install sidecar deps
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install -e core -e server pyinstaller
      - name: Freeze the sidecar (PyInstaller onefile)
        shell: bash
        run: |
          python -m PyInstaller --clean --noconfirm packaging/golavo-sidecar.spec \
            --distpath packaging/out --workpath packaging/build
      - name: Smoke test the frozen bundle (must exit 0)
        shell: bash
        run: |
          BIN="packaging/out/golavo-sidecar"
          [ -f "$BIN.exe" ] && BIN="$BIN.exe"
          "$BIN" --version
          "$BIN" --smoke
