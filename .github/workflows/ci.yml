name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    name: core / server (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          if [ -f core/pyproject.toml ]; then pip install -e "core[dev]" 2>/dev/null || pip install -e core; fi
          if [ -f server/pyproject.toml ]; then pip install -e server 2>/dev/null || true; fi
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (mypy)
        run: mypy core server || echo "mypy advisory during scaffold"
      - name: Test (pytest)
        run: |
          set +e
          pytest -q
          code=$?
          if [ $code -eq 5 ]; then echo "No tests collected yet (scaffold phase)."; exit 0; fi
          exit $code

  ui:
    name: ui (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build UI
        run: |
          if [ -f ui/package.json ]; then
            cd ui && npm install && npm run build --if-present
          else
            echo "No UI package yet (scaffold phase)."
          fi

  docs:
    name: docs-site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build docs
        run: |
          if [ -f docs-site/package.json ]; then
            cd docs-site && npm install && npm run build
          else
            echo "No docs-site yet (scaffold phase)."
          fi

  license-isolation:
    name: license isolation guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: ODbL must never contaminate the CC0 core
        run: bash scripts/check_license_isolation.sh
