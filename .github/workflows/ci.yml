name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  core:
    name: core / server (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e "core[dev]"
          pip install -e "server[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Validate pinned source provenance
        run: python scripts/validate_provenance.py
      - name: Validate canonical sample artifacts
        run: python scripts/validate_artifacts.py
      - name: Test determinism, leakage, core, and API
        run: pytest -q

  ui:
    name: ui (node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build UI
        run: |
          if [ -f ui/package.json ]; then
            cd ui && npm install && npm run build --if-present
          else
            echo "No UI package yet (scaffold phase)."
          fi

  docs:
    name: docs-site build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Build docs
        run: |
          if [ -f docs-site/package.json ]; then
            cd docs-site && npm install && npm run build
          else
            echo "No docs-site yet (scaffold phase)."
          fi

  license-isolation:
    name: license isolation guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: ODbL must never contaminate the CC0 core
        run: bash scripts/check_license_isolation.sh
