name: Bug report
description: Something is broken or behaves incorrectly.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. For **security** issues, do not use this form — see SECURITY.md.
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "e.g. v0.1.0 or commit abc1234"
    validations:
      required: true
  - type: dropdown
    id: mode
    attributes:
      label: Run mode
      options: [Source (local web), Desktop (macOS), Desktop (Windows)]
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment
      description: OS + version, and (if relevant) which data sources/AI providers were configured.
  - type: checkboxes
    id: checks
    attributes:
      label: Confirmations
      options:
        - label: I am not pasting any API keys, tokens, or private data.
          required: true
